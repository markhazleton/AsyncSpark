# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - AsyncSpark

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies for web project
        run: |
          cd AsyncSpark.Web
          npm ci

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Run tests with code coverage
        run: dotnet test --configuration Release --collect:"XPlat Code Coverage" --logger trx --results-directory ./TestResults --no-build

      - name: Check code coverage threshold
        shell: pwsh
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:./TestResults/**/coverage.cobertura.xml -targetdir:./CoverageReport -reporttypes:"TextSummary;Html"
          
          $summaryContent = Get-Content ./CoverageReport/Summary.txt -Raw
          Write-Host "Coverage Summary:"
          Write-Host $summaryContent
          
          $lineCoverageMatch = $summaryContent | Select-String 'Line coverage: (\d+\.?\d*)%'
          if ($lineCoverageMatch) {
            $coverage = [double]$lineCoverageMatch.Matches.Groups[1].Value
            Write-Host "Line coverage: $coverage%"
            
            if ($coverage -lt 80) {
              Write-Error "❌ Code coverage $coverage% is below 80% threshold"
              exit 1
            } else {
              Write-Host "✅ Code coverage $coverage% meets 80% threshold"
            }
          } else {
            Write-Warning "⚠️ Could not parse coverage percentage from summary"
          }

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EFF4A27D9C8F4DE392E3495A7CFAE59D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EF3B17855DF24F6A828600FB231B129A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_68F583C7AF7B4104A4B450D6DC8D5007 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "AsyncSpark"
          slot-name: "Production"
          package: .

